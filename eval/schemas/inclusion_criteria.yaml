      - feature extraction
      - information extraction
      - named entity recognition
      - NER
      - structured extraction
      - classification
      - data extraction
  study_type:
    - original research
    - technical report
    - validation study
  date_range: "2018-01-01 to 2026-12-31"
  language: English

exclusion_criteria:
  - "No radiology or pathology text involved"
